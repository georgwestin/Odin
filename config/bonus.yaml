service:
  name: bonus
  port: 8006
  env: development

database:
  url: postgres://odin:odin_secret@localhost:5432/odin?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m

redis:
  url: redis://localhost:6379/5

kafka:
  brokers:
    - localhost:9092

auth:
  public_key_path: ./keys/public.pem

bonus:
  limit_increase_delay: 24h
  min_cooling_off: 24h
  max_cooling_off: 1008h  # 6 weeks
